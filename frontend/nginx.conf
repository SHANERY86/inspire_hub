map $http_host $proxy_host_header {
  default $http_host;
  ''      $host;
}

# Edge proxy (TLS) often sets X-Forwarded-Proto: https; nginx must pass it to Django.
# Without this, $scheme is always http inside the container and Django disagrees with the browser.
map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  client_max_body_size 25M;

  location = / {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/;
  }

  # Prefix location is /inspire-hub/; without this, /inspire-hub gets a wrong-scheme slash redirect.
  location = /inspire-hub {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/;
  }

  # Old root-relative links (Django used to emit /admin/, /static/…). Send users under /inspire-hub/.
  location ^~ /admin/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }
  location ^~ /static/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }
  location ^~ /media/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }
  location ^~ /api/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }

  location = /inspire-hub/admin {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/admin/;
  }

  location /inspire-hub/api/ {
    rewrite ^/inspire-hub/api/(.*)$ /api/$1 break;
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /inspire-hub/admin/ {
    rewrite ^/inspire-hub/admin/(.*)$ /admin/$1 break;
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # Pass full path: Django STATIC_URL/MEDIA_URL use /inspire-hub/static/… for WhiteNoise.
  location /inspire-hub/static/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /inspire-hub/media/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /inspire-hub/ {
    rewrite ^/inspire-hub/(.*)$ /$1 break;
    try_files $uri /index.html;
  }
}
