map $http_host $proxy_host_header {
  default $http_host;
  ''      $host;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  client_max_body_size 25M;

  location = / {
    return 302 /inspire-hub/;
  }

  # Django admin redirects and static URLs are root-relative (/admin/login/, /static/…).
  # Without these, opening /inspire-hub/admin/ hits Django once, then the browser follows
  # Location: /admin/… and loads assets from /static/… — both must proxy to the backend.
  location /admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/ {
    proxy_pass http://backend:8000/static/;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /media/ {
    proxy_pass http://backend:8000/media/;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /inspire-hub/admin {
    return 302 /inspire-hub/admin/;
  }

  location /inspire-hub/api/ {
    rewrite ^/inspire-hub/api/(.*)$ /api/$1 break;
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /inspire-hub/admin/ {
    rewrite ^/inspire-hub/admin/(.*)$ /admin/$1 break;
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /inspire-hub/static/ {
    proxy_pass http://backend:8000/static/;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /inspire-hub/media/ {
    proxy_pass http://backend:8000/media/;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /inspire-hub/ {
    rewrite ^/inspire-hub/(.*)$ /$1 break;
    try_files $uri /index.html;
  }
}
