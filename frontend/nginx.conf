map $http_host $proxy_host_header {
  default $http_host;
  ''      $host;
}

# Edge proxy (TLS) often sets X-Forwarded-Proto: https; nginx must pass it to Django.
map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ''      $scheme;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  client_max_body_size 25M;

  location = / {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/;
  }

  location = /inspire-hub {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/;
  }

  # Bare paths (old links or bad HTML): send under /inspire-hub/ for Apache → Docker.
  location ^~ /admin/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }
  location ^~ /static/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }
  location ^~ /media/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }
  location ^~ /api/ {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub$request_uri;
  }

  location = /inspire-hub/admin {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/admin/;
  }

  # Without trailing slash these do not match /inspire-hub/api/ and fall through to the SPA block.
  location = /inspire-hub/api {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/api/;
  }
  location = /inspire-hub/api/v1 {
    return 302 $forwarded_proto://$proxy_host_header/inspire-hub/api/v1/;
  }

  # Pass full URI to Django (no strip). Django urlconf is mounted at /inspire-hub/…
  location /inspire-hub/api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  location /inspire-hub/admin/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $proxy_host_header;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
  }

  # Same volume as backend collectstatic; avoids WhiteNoise path quirks under a subpath.
  location /inspire-hub/static/ {
    alias /srv/static/;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /inspire-hub/media/ {
    alias /srv/media/;
    add_header Cache-Control "public, max-age=3600";
  }

  location /inspire-hub/ {
    rewrite ^/inspire-hub/(.*)$ /$1 break;
    try_files $uri /index.html;
  }
}
