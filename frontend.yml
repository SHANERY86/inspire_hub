apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: inspire
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: inspire_hub_frontend:subpath-v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: inspire
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inspire-ingress
  namespace: inspire
spec:
  rules:
    - http:
        paths:
          - path: /inspire-hub
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
