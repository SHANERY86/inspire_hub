apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: inspire
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: inspire_hub_backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DEBUG
              value: "False"
            - name: SECRET_KEY
              value: "k8s-dev-secret-key"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_PASSWORD
            - name: OCR_SPACE_API_KEY
              value: ""
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: inspire
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
