# Host vars: where the app lives on disk, and lowercase GitHub owner for ghcr.io/<owner>/… images.
# For private packages: -e ghcr_token=<classic PAT with read:packages>
# To pull/start Postgres first and wait for readiness: -e deploy_db=true (or set deploy_db: true below).

all:
  children:
    inspire:
      hosts:
        pi:
          ansible_host: 192.168.1.68
          ansible_user: pi
          inspire_install_dir: /opt/inspire_hub
          ghcr_owner: shanery86
          image_tag: latest
