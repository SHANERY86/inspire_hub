apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: inspire
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Secret
metadata:
  name: pg-secret
  namespace: inspire
type: Opaque
stringData:
  POSTGRES_DB: inspire_hub
  POSTGRES_USER: sryan
  POSTGRES_PASSWORD: sAmsung86
  DB_NAME: inspire_hub
  DB_USER: sryan
  DB_PASSWORD: sAmsung86
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: inspire
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_NAME
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-secret
                  key: DB_PASSWORD
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
